<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码重置工具</title>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans SC', 'Hiragino Sans GB', 'PingFang SC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f7f3ec;
            color: #221c16;
        }
        .reset-container {
            background: #fcfaf5;
            border: 1px solid #e2d8c8;
            padding: 44px 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 24px 48px -16px rgba(34, 28, 22, 0.2);
            max-width: 400px;
            width: 90%;
        }
        .reset-container h1 {
            font-size: 1.4rem;
            letter-spacing: 0.1em;
        }
        .reset-btn {
            background: transparent;
            color: #b0492f;
            border: 1px solid #b0492f;
            padding: 14px 30px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 15px;
            margin: 20px 0;
            transition: background 0.2s ease, color 0.2s ease;
        }
        .reset-btn:hover {
            background: #b0492f;
            color: #fcfaf5;
        }
        .success {
            color: #33523f;
            background: rgba(79, 122, 94, 0.12);
            border: 1px solid rgba(79, 122, 94, 0.4);
            padding: 10px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .info {
            color: #5d5348;
            font-size: 14px;
            line-height: 1.6;
        }
        .info a {
            color: #a86a44;
        }
        code {
            background: #efe8dc;
            border: 1px solid #e2d8c8;
            padding: 2px 8px;
            border-radius: 4px;
            color: #a86a44;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h1>密码重置工具</h1>
        <p class="info">此工具将立即重置后台管理密码为默认密码</p>
        
        <button id="resetBtn" class="reset-btn">重置密码为 admin123</button>
        
        <div id="message" style="display: none;"></div>
        
        <p class="info">
            <strong>默认密码：</strong><code>admin123</code><br>
            重置后请<a href="login.html">点击这里登录</a>
        </p>
    </div>

    <script src="./js/auth.js"></script>
    <script>
        document.getElementById('resetBtn').addEventListener('click', function() {
            if (confirm('确定要重置密码为默认密码 "admin123" 吗？')) {
                try {
                    // 创建认证管理器实例
                    const authManager = new AuthManager();
                    
                    // 重置密码
                    authManager.resetPassword();
                    
                    // 显示成功消息
                    const message = document.getElementById('message');
                    message.innerHTML = '<div class="success">✅ 密码重置成功！<br>默认密码：<strong>admin123</strong></div>';
                    message.style.display = 'block';
                    
                    // 隐藏重置按钮
                    this.style.display = 'none';
                    
                } catch (error) {
                    console.error('重置密码失败:', error);
                    const message = document.getElementById('message');
                    message.innerHTML = '<div style="color: #e53e3e; background: #fed7d7; padding: 10px; border-radius: 8px;">❌ 重置失败，请手动清除浏览器localStorage</div>';
                    message.style.display = 'block';
                }
            }
        });
        
        // 页面加载时自动重置（可选，取消注释下面代码）
        // window.addEventListener('load', function() {
        //     const authManager = new AuthManager();
        //     authManager.resetPassword();
        //     document.getElementById('message').innerHTML = '<div class="success">✅ 密码已自动重置为：admin123</div>';
        //     document.getElementById('message').style.display = 'block';
        // });
    </script>
</body>
</html>
